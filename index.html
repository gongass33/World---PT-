<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WORLD PT</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --neon-cyan:#00f5ff;
  --neon-purple:#bf00ff;
  --dark:#05030f;
  --card-bg:#0d0820cc;
  --text:#e8e0ff;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:var(--dark);
  color:var(--text);
  font-family:'Space Mono', monospace;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:1.5rem;
  border-bottom:1px solid rgba(0,245,255,0.15);
}

.logo{
  font-family:'Orbitron', sans-serif;
  font-weight:900;
  font-size:2rem;
  color:var(--neon-cyan);
  animation:flicker 6s infinite;
}

@keyframes flicker{
  0%,100%{opacity:1}
  92%{opacity:.6}
  95%{opacity:.3}
}

/* BUTTON BASE */
.btn{
  font-family:'Orbitron',sans-serif;
  font-size:.75rem;
  font-weight:700;
  letter-spacing:.1em;
  text-transform:uppercase;
  padding:.7rem 1.5rem;
  cursor:pointer;
  text-decoration:none;
  display:inline-block;
}

.btn-primary{
  background:var(--neon-cyan);
  color:#000;
  border:none;
}

.btn-outline{
  border:1px solid var(--neon-purple);
  color:var(--neon-purple);
}

main{
  padding:2rem;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:1rem;
}

.card{
  background:var(--card-bg);
  border:1px solid rgba(0,245,255,0.08);
  padding:1rem;
  text-decoration:none;
  color:var(--text);
  transition:.2s;
}

.card:hover{
  border-color:var(--neon-cyan);
  transform:translateY(-4px);
}

.card-title{
  font-family:'Orbitron',sans-serif;
  font-size:.9rem;
}

footer{
  text-align:center;
  padding:1.5rem;
  opacity:.6;
}

@media(max-width:768px){
  header{padding:1rem}
  .cards{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
}
</style>
</head>

<body>

<header>
  <div class="logo">WORLD PT</div>
  <a href="#" class="btn btn-outline">Menu</a>
</header>

<main>
  <div class="cards">
    <a href="#" class="card"><div class="card-title">Homem-Aranha</div></a>
    <a href="#" class="card"><div class="card-title">Batman</div></a>
    <a href="#" class="card"><div class="card-title">Superman</div></a>
    <a href="#" class="card"><div class="card-title">Flash</div></a>
  </div>
</main>

<footer>
  © 2026 WORLD PT
</footer>

</body>
</html>
