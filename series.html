<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WORLD PT</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#05030f;
  --card:#0d0820cc;
  --text:#e8e0ff;
  --cyan:#00f5ff;
  --purple:#bf00ff;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Space Mono', monospace;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:1.2rem;
  border-bottom:1px solid rgba(0,245,255,0.15);
}

.logo{
  font-family:'Orbitron',sans-serif;
  font-weight:900;
  font-size:1.8rem;
  color:var(--cyan);
  animation:flicker 6s infinite;
}

@keyframes flicker{
  0%,100%{opacity:1}
  94%{opacity:.6}
}

.btn{
  font-family:'Orbitron',sans-serif;
  font-size:.7rem;
  letter-spacing:.1em;
  text-transform:uppercase;
  padding:.6rem 1.4rem;
  text-decoration:none;
}

.btn-outline{
  border:1px solid var(--purple);
  color:var(--purple);
}

main{padding:2rem}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:1rem;
}

.card{
  background:var(--card);
  border:1px solid rgba(0,245,255,0.08);
  padding:1rem;
  text-decoration:none;
  color:var(--text);
  transition:.2s;
}

.card:hover{
  border-color:var(--cyan);
  transform:translateY(-3px);
}

.title{
  font-family:'Orbitron',sans-serif;
  font-size:.85rem;
}

footer{
  text-align:center;
  padding:1rem;
  opacity:.6;
}

@media(max-width:768px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
}
</style>
</head>

<body>

<header>
  <div class="logo">WORLD PT</div>
  <a href="#" class="btn btn-outline">Menu</a>
</header>

<main>
  <div class="grid">
    <a href="#" class="card"><div class="title">Conteúdo 1</div></a>
    <a href="#" class="card"><div class="title">Conteúdo 2</div></a>
    <a href="#" class="card"><div class="title">Conteúdo 3</div></a>
    <a href="#" class="card"><div class="title">Conteúdo 4</div></a>
  </div>
</main>

<footer>
  © 2026 WORLD PT
</footer>

</body>
</html>
