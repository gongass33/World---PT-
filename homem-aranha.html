<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O Incrível Homem-Aranha — WORLD PT</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=VT323&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --neon-pink: #ff2d78;
  --neon-cyan: #00f5ff;
  --neon-yellow: #ffe600;
  --neon-purple: #bf00ff;
  --dark: #05030f;
  --dark2: #0d0820;
  --dark3: #120d2a;
  --card-bg: #0d0820cc;
  --text: #e8e0ff;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--dark);
  color: var(--text);
  font-family: 'Space Mono', monospace;
}

/* BASE BUTTON */
.btn {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 0.85rem 2rem;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
}

.btn-primary {
  color: var(--dark);
  background: var(--neon-cyan);
  border:none;
}

.btn-outline {
  color: var(--neon-purple);
  background: transparent;
  border:1px solid var(--neon-purple);
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  padding:1.5rem;
  border-bottom:1px solid rgba(0,245,255,0.15);
}

.logo {
  font-family:'Orbitron', sans-serif;
  font-weight:900;
  font-size:2rem;
  color:var(--neon-cyan);
  animation:flicker 8s infinite;
}

@keyframes flicker {
  0%,100% {opacity:1}
  95% {opacity:0.7}
}

/* GRID */
.cards-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:1rem;
}

.card {
  background: var(--card-bg);
  border:1px solid rgba(0,245,255,0.08);
  text-decoration:none;
  display:block;
}

.card:hover {
  border-color:var(--neon-cyan);
  transform:translateY(-4px);
}

/* MEDIA */
@media (max-width:768px) {
  header { padding:1rem; }
  .cards-grid { grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); }
}
</style>
</head>

<body>

<header>
  <div class="logo">WORLD PT</div>
</header>

<main style="padding:2rem">
  <div class="cards-grid">
    <a class="card" href="#">Filme 1</a>
    <a class="card" href="#">Filme 2</a>
    <a class="card" href="#">Filme 3</a>
  </div>
</main>

</body>
</html>
